<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SA Loadshedding Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 <!--All that is left is to add a API from eskomsepush , which needs a subscription-->
  <div class="container">
    <h1>South African Loadshedding Tracker</h1>
    <p>Made by Siyabonga Mofokeng</p>

    <input type="text" id="area" placeholder="Enter your area">

    <select id="stage">
      <option value="">Select Loadshedding Stage</option>
      <option value="1">Stage 1</option>
      <option value="2">Stage 2</option>
      <option value="3">Stage 3</option>
      <option value="4">Stage 4</option>
      <option value="5">Stage 5</option>
      <option value="6">Stage 6</option>
    </select>

    <button onclick="checkSchedule()">Check Schedule</button>

    <div id="result"></div>
  </div>

<script src="script.js"></script>
</body>

</html>
